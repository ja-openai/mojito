<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MF2 Translation Workbench</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>MF2 Translation Workbench</h1>
        <p>Translate in context. Keep MF2 structure valid underneath.</p>
      </div>
      <div class="status" id="status">Ready</div>
    </header>

    <main class="workspace">
      <section class="panel workbench-panel">
        <div class="panel-header">
          <h2>Translation</h2>
          <div class="button-row">
            <button type="button" data-sample="simple">Simple</button>
            <button type="button" data-sample="plural">Plural</button>
            <button type="button" data-sample="gender">Gender + plural</button>
            <button type="button" data-sample="markup">Markup</button>
          </div>
        </div>

        <div class="context-strip">
          <div>
            <span class="eyebrow">Source message</span>
            <p id="sourceReference">You have {count} files</p>
          </div>
          <div>
            <span class="eyebrow">Context</span>
            <p>Cart badge in checkout header. Keep it short.</p>
          </div>
        </div>

        <section class="hero-preview" aria-label="Rendered translation preview">
          <span class="eyebrow">Live preview</span>
          <output id="rendered"></output>
        </section>

        <div class="editor-toolbar">
          <div class="button-row">
            <button type="button" id="addPlural" class="primary">Add plural</button>
            <button type="button" id="addVariant">Add variant</button>
          </div>
          <button type="button" id="formatSource">Normalize MF2</button>
        </div>

        <div id="structure" class="wysiwyg-editor"></div>
      </section>

      <section class="panel side-panel">
        <div class="panel-header">
          <h2>Checks</h2>
          <label class="locale-field">
            Locale
            <select id="locale">
              <option value="en">en</option>
              <option value="fr">fr</option>
              <option value="ru">ru</option>
              <option value="ar">ar</option>
              <option value="ja">ja</option>
            </select>
          </label>
        </div>

        <div class="subpanel">
          <h3>Preview Values</h3>
          <div id="arguments" class="arguments"></div>
        </div>

        <div class="subpanel">
          <h3>Quality</h3>
          <ul id="diagnostics" class="diagnostics"></ul>
        </div>

        <details class="advanced">
          <summary>Raw target MF2</summary>
          <textarea id="source" spellcheck="false"></textarea>
        </details>

        <details class="advanced">
          <summary>Formatted parts</summary>
          <pre id="parts"></pre>
        </details>
      </section>
    </main>

    <script type="module" src="./editor.js"></script>
  </body>
</html>
